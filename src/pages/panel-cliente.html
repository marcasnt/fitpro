<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITPRO COACH - Mi Rutina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="client-panel">
  <!-- Header -->
  <header class="client-header">
    <div class="client-brand">
      <div style="width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #00FF88 0%, #00CCFF 100%); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #0D0D0D;">
        💪
      </div>
      <h2>FITPRO COACH</h2>
    </div>
    
    <div class="client-nav">
      <button class="btn btn-ghost btn-sm" id="chatBtn">
        💬 Mensajes
      </button>
      <div class="user-info" style="margin: 0;">
        <div class="user-avatar" id="userAvatar">U</div>
        <div class="user-details">
          <div class="user-name" id="userName">Usuario</div>
          <div class="user-role">Asesorado</div>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" title="Cerrar sesión">
        🚪
      </button>
    </div>
  </header>

  <!-- Progress Bar -->
  <div style="height: 4px; background: #1A1A1A;">
    <div class="progress-fill" id="progressBar" style="width: 0%;"></div>
  </div>

  <!-- Main Content -->
  <main class="workout-section">
    <!-- Day Header -->
    <div class="day-header">
      <span class="day-type" id="dayType">Cargando...</span>
      <h1 id="dayTitle">Mi Rutina</h1>
      <p style="color: #666;">Completa tus ejercicios y marca cada serie</p>
    </div>

    <!-- Exercises Container -->
    <div id="exercisesContainer">
      <!-- Los ejercicios se cargan dinámicamente -->
      <div class="empty-state">
        <div class="skeleton" style="height: 200px; margin-bottom: 1rem;"></div>
        <div class="skeleton" style="height: 200px; margin-bottom: 1rem;"></div>
        <div class="skeleton" style="height: 200px;"></div>
      </div>
    </div>

    <!-- Complete Session Button -->
    <div style="position: fixed; bottom: 0; left: 0; right: 0; padding: 1.5rem; background: linear-gradient(to top, #0D0D0D 0%, transparent 100%); display: flex; justify-content: center;">
      <button class="btn btn-primary btn-lg" id="completeSessionBtn" disabled style="box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);">
        Progreso: 0%
      </button>
    </div>
  </main>

  <!-- Scripts -->
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/timer.js"></script>
  <script src="../js/chat.js"></script>
  <script src="../js/cliente.js"></script>
  
  <script>
    // Set user initials
    document.addEventListener('DOMContentLoaded', () => {
      const user = Auth.getCurrentUser();
      if (user) {
        document.getElementById('userAvatar').textContent = user.nombre.charAt(0).toUpperCase();
      }
    });
  </script>
</body>
</html>
