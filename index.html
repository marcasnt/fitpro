<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITPRO COACH - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/styles.css">
  <style>
    /* Login Page Specific Styles */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      position: relative;
      overflow: hidden;
    }

    .login-page::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0, 255, 136, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 204, 255, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(255, 51, 102, 0.04) 0%, transparent 60%);
      animation: bgPulse 15s ease-in-out infinite;
    }

    @keyframes bgPulse {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(2%, 2%) rotate(1deg); }
      66% { transform: translate(-1%, 1%) rotate(-1deg); }
    }

    .login-page::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 3rem;
      background: rgba(18, 18, 24, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      box-shadow: 
        0 0 0 1px rgba(0, 0, 0, 0.5),
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        0 0 100px -20px rgba(0, 255, 136, 0.15);
      animation: cardEntry 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardEntry {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-logo h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, rgba(0, 255, 136, 0.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .login-logo p {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .login-card .form-group {
      margin-bottom: 1.25rem;
    }

    .login-card .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .login-card .form-input {
      width: 100%;
      padding: 1rem 1.25rem;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #fff;
      transition: all 0.2s ease;
    }

    .login-card .form-input:focus {
      outline: none;
      border-color: rgba(0, 255, 136, 0.5);
      box-shadow: 0 0 0 4px rgba(0, 255, 136, 0.1);
      background: rgba(255, 255, 255, 0.05);
    }

    .login-card .form-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .login-card .form-input.error {
      border-color: rgba(255, 51, 102, 0.5);
      box-shadow: 0 0 0 4px rgba(255, 51, 102, 0.1);
    }

    .login-card .btn {
      width: 100%;
      padding: 1rem 2rem;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .login-card .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }

    .login-card .btn:hover::before {
      left: 100%;
    }

    .login-card .btn:active {
      transform: scale(0.98);
    }

    .login-card .form-error {
      font-size: 0.75rem;
      color: #FF3366;
      margin-top: 0.5rem;
      min-height: 1rem;
    }

    .login-footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .login-footer p {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.4);
    }

    /* Loading state for button */
    .btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .btn.loading::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      margin: -10px 0 0 -10px;
      border: 2px solid transparent;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-card {
        margin: 1rem;
        padding: 2rem 1.5rem;
      }

      .login-logo h1 {
        font-size: 1.75rem;
      }
    }
  </style>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>FITPRO COACH</h1>
      <p>Sistema de Gestión de Rutinas</p>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          class="form-input" 
          placeholder="tu@email.com"
          autocomplete="email"
          required
        >
        <div class="form-error" id="emailError"></div>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
        <div class="form-error" id="passwordError"></div>
      </div>
      
      <button type="submit" class="btn btn-primary" id="loginBtn">
        Iniciar Sesión
      </button>
    </form>
    
    <div class="login-footer">
      <p>¿No tienes cuenta? Contacta a tu coach</p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="src/js/config.js"></script>
  <script src="src/js/utils.js"></script>
  <script src="src/js/auth.js"></script>
  
  <script>
    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      
      // Clear errors
      document.getElementById('emailError').textContent = '';
      document.getElementById('passwordError').textContent = '';
      document.getElementById('email').classList.remove('error');
      document.getElementById('password').classList.remove('error');
      
      // Loading state
      btn.classList.add('loading');
      btn.textContent = '';
      
      const result = await Auth.login(email, password);
      
      btn.classList.remove('loading');
      btn.textContent = 'Iniciar Sesión';
      
      if (!result.success) {
        Utils.showToast(result.error, 'error');
        document.getElementById('email').classList.add('error');
        document.getElementById('password').classList.add('error');
        document.getElementById('passwordError').textContent = result.error;
      }
    });
  </script>
</body>
</html>
