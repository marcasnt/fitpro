<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FITPRO COACH - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/styles.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>FITPRO COACH</h1>
      <p>Sistema de Gestión de Rutinas</p>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          class="form-input" 
          placeholder="tu@email.com"
          autocomplete="email"
          required
        >
        <div class="form-error" id="emailError"></div>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="••••••••"
          autocomplete="current-password"
          required
        >
        <div class="form-error" id="passwordError"></div>
      </div>
      
      <button type="submit" class="btn btn-primary btn-lg btn-block" id="loginBtn">
        Iniciar Sesión
      </button>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem;">
      <p style="color: #666; font-size: 0.875rem;">
        ¿No tienes cuenta? Contacta a tu coach
      </p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="src/js/config.js"></script>
  <script src="src/js/utils.js"></script>
  <script src="src/js/auth.js"></script>
  
  <script>
    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      
      // Clear errors
      document.getElementById('emailError').textContent = '';
      document.getElementById('passwordError').textContent = '';
      document.getElementById('email').classList.remove('error');
      document.getElementById('password').classList.remove('error');
      
      // Loading state
      Utils.setButtonLoading(btn, true);
      
      const result = await Auth.login(email, password);
      
      Utils.setButtonLoading(btn, false);
      
      if (!result.success) {
        // Show error
        Utils.showToast(result.error, 'error');
        
        // Set error state on inputs
        document.getElementById('email').classList.add('error');
        document.getElementById('password').classList.add('error');
        document.getElementById('passwordError').textContent = result.error;
      }
    });
  </script>
</body>
</html>
